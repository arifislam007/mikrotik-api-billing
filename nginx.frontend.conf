# AlmaLinux: place this file at /etc/nginx/conf.d/mikrotik-billing.conf
# Run: sudo setsebool -P httpd_can_network_connect 1   (SELinux)
# Run: sudo firewall-cmd --permanent --add-service=http && sudo firewall-cmd --reload

server {
    listen 80;
    server_name _;

    root /var/www/mikrotik-billing/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}